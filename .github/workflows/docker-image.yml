name: CI/CD Docker Pipeline

# Запускать при пуше в основную ветку
on:
  push:
    branches:
      - main

# Здесь определяются задачи (jobs)
jobs:
  build-and-push:
    name: Сборка и публикация Docker образа
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Docker Buildx (для расширенной сборки)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Логинимся в Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. (Опционально) Генерируем метаданные для тегов (версии, latest)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/my-app-name
          tags: |
            type=sha,prefix={{date 'YYYYMMDD'}}-  # Тег вида 20250325-abc1234
            type=raw,value=latest                 # Тег latest

      # 5. Собираем и отправляем образ в реестр
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .          # Путь к папке с Dockerfile
          push: true          # Отправляем образ
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Кэширование слоев для ускорения сборки
          cache-to: type=gha,mode=max
